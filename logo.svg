<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle with soft glow -->
  <circle cx="32" cy="32" r="30" fill="#fef3c7" stroke="url(#gradient1)" stroke-width="2.5" opacity="0.9"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#gradient2)" stroke-width="1" opacity="0.3"/>

  <!-- Cute robot/agent character -->
  <g transform="translate(16, 10)">
    <!-- Head shape - more rounded and cute -->
    <ellipse cx="16" cy="14" rx="14" ry="13" fill="url(#gradient1)" opacity="0.95"/>

    <!-- Cute big eyes -->
    <ellipse cx="8" cy="12" rx="4" ry="5" fill="#ffffff"/>
    <ellipse cx="24" cy="12" rx="4" ry="5" fill="#ffffff"/>
    <circle cx="8" cy="13" r="2.5" fill="#1e293b"/>
    <circle cx="24" cy="13" r="2.5" fill="#1e293b"/>
    <!-- Sparkle in eyes -->
    <circle cx="9" cy="11" r="0.8" fill="#ffffff"/>
    <circle cx="25" cy="11" r="0.8" fill="#ffffff"/>

    <!-- Cute smile -->
    <path d="M 10 18 Q 16 22 22 18" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Cute antenna with heart -->
    <line x1="16" y1="1" x2="16" y2="-3" stroke="url(#gradient1)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 16 -5 C 14 -7 14 -3 16 -5 C 18 -3 18 -7 16 -5" fill="url(#gradient2)"/>

    <!-- Blush cheeks -->
    <ellipse cx="4" cy="16" rx="2.5" ry="1.5" fill="#fbbf24" opacity="0.6"/>
    <ellipse cx="28" cy="16" rx="2.5" ry="1.5" fill="#fbbf24" opacity="0.6"/>
  </g>

  <!-- Cute markdown document with personality -->
  <g transform="translate(18, 30)">
    <rect x="0" y="0" width="28" height="26" rx="3" fill="#ffffff" stroke="url(#gradient2)" stroke-width="2"/>

    <!-- Document face -->
    <circle cx="8" cy="8" r="1.5" fill="#a855f7"/>
    <circle cx="20" cy="8" r="1.5" fill="#a855f7"/>
    <path d="M 6 12 Q 14 15 22 12" stroke="#a855f7" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Content lines with cute style -->
    <line x1="4" y1="18" x2="24" y2="18" stroke="#e5e7eb" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="21" x2="20" y2="21" stroke="#e5e7eb" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Hearts and sparkles for cuteness -->
  <g opacity="0.7">
    <path d="M 8 8 C 7 7 7 9 8 8 C 9 9 9 7 8 8" fill="#ec4899"/>
    <path d="M 52 12 C 51 11 51 13 52 12 C 53 13 53 11 52 12" fill="#f97316"/>
    <circle cx="48" cy="8" r="1" fill="#fbbf24"/>
    <circle cx="12" cy="50" r="1" fill="#a855f7"/>
  </g>

  <!-- Connection with hearts -->
  <path d="M 32 23 L 32 29" stroke="url(#gradient2)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 30 26 C 29 25 29 27 30 26 C 31 27 31 25 30 26" fill="#ec4899" opacity="0.8"/>
</svg>
