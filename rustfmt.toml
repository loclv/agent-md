# rustfmt configuration file
# https://rust-lang.github.io/rustfmt/

# Edition
edition = "2021"

# Width settings
max_width = 100
hard_tabs = true
newline_style = "Unix"

# Imports
reorder_imports = true

# Trailing commas (requires nightly)
# trailing_comma = "Vertical"

# Blank lines (requires nightly)
# blank_lines_upper_bound = 1

# Spaces (requires nightly)
# spaces_around_ranges = false

# Misc
remove_nested_parens = true
use_field_init_shorthand = true
merge_derives = true
use_small_heuristics = "Default"

# Nightly options (commented out for stable)
# wrap_comments = true
# comment_width = 80
# normalize_comments = true
# normalize_doc_attributes = true
# format_strings = true
# format_macro_matchers = true
# format_macro_bodies = true
# fn_args_layout = "Tall"
# fn_args_density = "Tall"
# fn_single_line = false
# where_single_line = false
# single_line_if_else_max_width = 50
# single_line_let_else_max_width = 50
# brace_style = "SameLineWhere"
# control_brace_style = "AlwaysSameLine"
# match_block_trailing_comma = false
# blank_lines_lower_bound = 0
# attr_fn_like_line_style = "Multi"
# fn_params_layout = "Tall"
# single_line_if_else = true
# chain_width = 60
# struct_field_align_threshold = 0
# struct_lit_single_line = true
# struct_variant_width = 35
# enum_discrim_align_threshold = 0
# space_before_colon = false
# space_after_colon = true
# imports_granularity = "Crate"
# import_layout = "Vertical"
# group_imports = "StdExternalCrate"
# condense_wildcard_suffixes = false
# color = "Auto"
# required_version = "1.5.1"
