<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Friendly Document-Robot Body -->
  <rect x="10" y="10" width="44" height="44" rx="12" fill="url(#mainGradient)" />
  
  <!-- Inner White Face/Document Area -->
  <rect x="14" y="14" width="36" height="36" rx="8" fill="#ffffff" />

  <!-- Cute Eyes -->
  <circle cx="24" cy="28" r="4" fill="#1e293b" />
  <circle cx="40" cy="28" r="4" fill="#1e293b" />
  
  <!-- Eye Sparkles -->
  <circle cx="25.5" cy="26.5" r="1.2" fill="#ffffff" />
  <circle cx="41.5" cy="26.5" r="1.2" fill="#ffffff" />

  <!-- Simple Happy Smile -->
  <path d="M 26 38 Q 32 42 38 38" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- Blush -->
  <circle cx="19" cy="33" r="2.5" fill="#fecaca" />
  <circle cx="45" cy="33" r="2.5" fill="#fecaca" />

  <!-- Mini Antenna -->
  <rect x="30" y="4" width="4" height="6" rx="2" fill="url(#mainGradient)" />
  <circle cx="32" cy="4" r="3" fill="#ec4899" />

  <!-- Minimal Markdown Icon (M) on forehead -->
  <path d="M 28 18 L 30 22 L 32 18 L 34 22 L 36 18" stroke="#f97316" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4" />
</svg>
